name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  backend-build:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore JobApplicationTracker.sln
        working-directory: backend

      - name: Build solution
        run: dotnet build JobApplicationTracker.sln --configuration Release --no-restore
        working-directory: backend

  frontend-build:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/job-application-tracker-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/job-application-tracker-ui

      - name: Build project
        run: npm run build
        working-directory: frontend/job-application-tracker-ui